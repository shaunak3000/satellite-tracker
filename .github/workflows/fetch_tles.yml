name: Fetch TLE data

on:
  schedule:
    - cron: '0 6 * * *'   # once daily at 06:00 UTC (upstream TLEs refresh ~1x/day)
  workflow_dispatch:        # manual trigger

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      # Non-blocking: if the upstream TLE source is down, keep the existing
      # tles.json and still run enrichment on it.
      - name: Fetch TLE data
        run: python fetch_tles.py
        continue-on-error: true

      - name: Enrich with Space-Track SATCAT (country, launch date)
        env:
          SPACE_TRACK_IDENTITY: ${{ secrets.SPACE_TRACK_IDENTITY }}
          SPACE_TRACK_PASSWORD: ${{ secrets.SPACE_TRACK_PASSWORD }}
          SPACE_TRACK_CREDS: ${{ secrets.SPACE_TRACK_CREDS }}
        run: python enrich_satcat.py

      - name: Commit and push tles.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tles.json
          git diff --staged --quiet || git commit -m "Update TLE data $(date -u +%Y-%m-%d)"
          git push
